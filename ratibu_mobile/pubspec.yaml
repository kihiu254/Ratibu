name: ratibu_mobile
description: A new Flutter project.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  supabase_flutter: ^2.8.0
  flutter_riverpod: ^2.6.1
  go_router: ^17.1.0
  google_fonts: ^8.0.2
  intl: ^0.20.2
  shared_preferences: ^2.5.4
  image_picker: ^1.1.2
  flutter_local_notifications: ^17.2.2
  share_plus: ^12.0.1
  lucide_icons: ^0.257.0
  package_info_plus: ^9.0.0
  connectivity_plus: ^7.0.0
  url_launcher: ^6.3.1
  local_auth: ^2.3.0
  animations: ^2.0.11
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  timezone: ^0.9.4
  flutter_native_splash: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#020617"
  adaptive_icon_foreground: "assets/images/logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#020617"
  image: "assets/images/launcher_foreground.png"
  android_12:
    image: "assets/images/launcher_foreground.png"
    color: "#020617"
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
