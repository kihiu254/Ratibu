<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Security alert: Email updated</title>
  <style>
    body { margin:0; padding:0; background:#f8fafc; color:#0f172a; font-family:'Outfit','Inter','Segoe UI',Arial,sans-serif; }
    table { border-collapse:collapse; }
    .container { width:100%; background:#f8fafc; }
    .card { width:560px; max-width:560px; background:#ffffff; border-radius:18px; border:1px solid #e2e8f0; }
    .headline { font-size:24px; line-height:1.2; margin:0 0 12px; color:#0f172a; }
    .text { font-size:16px; line-height:1.6; margin:0 0 16px; color:#334155; }
    .btn { background:#B91C1C; color:#ffffff !important; text-decoration:none; padding:12px 22px; border-radius:999px; display:inline-block; font-weight:600; }
    .muted { color:#64748b; font-size:14px; line-height:1.6; }
    .divider { height:1px; background:#e2e8f0; margin:24px 0; }
    .pill { display:inline-block; padding:4px 10px; border-radius:999px; font-size:12px; font-weight:600; background:#fee2e2; color:#991b1b; }
  </style>
</head>
<body>
  <div style="display:none;max-height:0;overflow:hidden;opacity:0;color:transparent;">
    Your Ratibu email was updated.
  </div>
  <table role="presentation" class="container" width="100%" cellspacing="0" cellpadding="0">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" class="card" width="560" cellspacing="0" cellpadding="0">
          <tr>
            <td style="background:#B91C1C;padding:18px 26px;border-radius:18px 18px 0 0;">
              <table role="presentation" width="100%">
                <tr>
                  <td align="left" style="color:#ffffff;font-weight:700;font-size:18px;letter-spacing:0.5px;">
                    <img src="{{ .SiteURL }}/ratibu-logo.png" alt="Ratibu" width="28" height="28" style="vertical-align:middle;border:0;display:inline-block;margin-right:8px;">
                    <span style="vertical-align:middle;">Ratibu</span>
                  </td>
                  <td align="right" style="color:#fecaca;font-size:12px;">Security alert</td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:26px;">
              <span class="pill">Security alert</span>
              <h1 class="headline" style="margin-top:12px;">Email updated</h1>
              <p class="text">Your Ratibu email was changed from <strong>{{ .OldEmail }}</strong> to <strong>{{ .NewEmail }}</strong>.</p>
              <p class="text">If you did not make this change, secure your account immediately.</p>
              <p style="margin:0 0 20px;">
                <a class="btn" href="{{ .SiteURL }}/settings/security">Review security</a>
              </p>
              <div class="divider"></div>
              <p class="muted" style="margin:0;">Need help? Visit {{ .SiteURL }}.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
