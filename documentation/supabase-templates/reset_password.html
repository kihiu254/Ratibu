<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Your Password - Ratibu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #020617;
            color: #ffffff;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo {
            width: 120px;
            height: auto;
        }
        .card {
            background-color: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 24px;
            color: #ffffff;
        }
        p {
            font-size: 16px;
            line-height: 24px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 32px;
        }
        .btn {
            display: inline-block;
            background-color: #B91C1C;
            color: #ffffff;
            font-weight: 700;
            font-size: 16px;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .btn:hover {
            background-color: #db2714;
            transform: translateY(-1px);
        }
        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="{{ .SiteURL }}/ratibu-logo.png" alt="Ratibu Logo" class="logo">
        </div>
        <div class="card">
            <h1>Reset Password</h1>
            <p>We received a request to reset your password. If you didn't make this request, you can safely ignore this email.</p>
            <a href="{{ .ConfirmationURL }}" class="btn">Reset Password</a>
        </div>
        <div class="footer">
            &copy; 2026 Ratibu. All rights reserved.<br>
            Empowering your financial journey.
        </div>
    </div>
</body>
</html>
